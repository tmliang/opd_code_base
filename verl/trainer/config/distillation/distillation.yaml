# Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
_target_: verl.workers.config.DistillationConfig

# specify the default per-component configs
defaults:

  # <folder_name>@<field_name>.<field_name>: <yaml_file_name>

  # load the default config, then apply the fields in the current yaml
  # self config override anything above
  - _self_

# Whether to enable distillation.
enabled: false

# Distillation mode:
#   - "external" (default): verl OPD with a separate teacher Ray cluster (vLLM/SGLang).
#   - "self"             : OPSD. Teacher colocated with the actor; only the prompt
#                          differs from the student. Reuses the OPD loss kernel.
mode: external

# distillation loss config
distillation_loss:

  # # Required when using verl.utils.omega_conf_to_dataclass to instantiate dataclass configs
  _target_: verl.workers.config.DistillationLossConfig


  # Loss function mode for distillation
  loss_mode: k3

  # If distillation loss requires top-k logits, this is the value of k
  topk: 32

  # Whether to include task rewards alongside distillation loss.
  use_task_rewards: true


  # The coef of the distillation loss when use_task_rewards is true
  distillation_loss_coef: 1.0

  # Optional max clamp value for distillation loss. If null, no clamping is applied.
  loss_max_clamp: null

  # Optional min clamp value for log probabilities for stability, e.g., log q - log p where p or q are very close to zero.
  log_prob_min_clamp: null

  # Whether to incorporate distillation loss as a reward.
  use_policy_gradient: false

  # Name of the policy loss to use when use_policy_gradient is true.
  policy_loss_mode: "vanilla"

  # PPO clipping ratio for policy loss.
  clip_ratio: 0.2

  # Lower bound for PPO clipping ratio.
  clip_ratio_low: 0.2 

  # Upper bound for PPO clipping ratio.
  clip_ratio_high: 0.2

  # Which family of distillation kernels to use:
  #   "verl" (default) -> existing dispatch via loss_mode above
  #                       (k1 / k3 / abs / mse / low_var_kl / kl / forward_kl_topk).
  #   "sdpo"           -> SDPO alpha-parameterised KL. loss_mode is overridden
  #                       automatically to sdpo_alpha_kl_topk (or _sampled when
  #                       sdpo.mode==sampled); the verl loss_mode field is ignored.
  kl_family: verl

  # SDPO alpha-KL hyperparameters. Consulted only when kl_family == "sdpo".
  sdpo:
    _target_: verl.workers.config.SDPODistillationLossConfig
    # alpha == 0   -> forward KL  (KL(teacher || student))
    # alpha == 0.5 -> Jensen-Shannon divergence
    # alpha == 1   -> reverse KL  (KL(student || teacher))   ← only mode that works in "sampled" mode
    # alpha in (0,1)\{0.5} -> skew / generalised JSD
    alpha: 1.0
    # "topk":    consumes teacher top-k logprobs+ids in batch (OPD external teacher; OPSD blocked until top-k extraction lands)
    # "full":    full-vocab teacher logprobs (not yet wired)
    # "sampled": sampled-token logprob path; alpha must be 1.0
    mode: topk
    # How to handle the residual mass outside the top-K when mode==topk.
    #   "add"    : append a virtual K+1 bucket carrying log(1 - Σ p_i) (SDPO default)
    #   "renorm" : re-normalise both top-K distributions to sum to 1
    #   "drop"   : use raw top-K log-probs unchanged
    tail: add
    # Optional per-token PPO ratio clip applied to the distillation loss:
    # multiply each token by min(exp(student_lp - old_lp), ratio_clip). null disables.
    ratio_clip: null


# Number of GPUs per node in the distillation teacher resource pool
n_gpus_per_node: 8

# Number of nodes in the distillation teacher resource pool
nnodes: 0

# multi-teacher configs
teacher_models:

  # Single-teacher config. This entry is popped when other teacher entries are added, so
  # using `teacher_model` as one of several keys silently drops it. For
  # example, the following CLI overrides result in ONLY `teacher_model2` being used:
  #
  # distillation.teacher_models.teacher_model.key=openai/gsm8k
  # distillation.teacher_models.teacher_model.model_path=Qwen/Qwen3-4B
  # +distillation.teacher_models.teacher_model2.key=hiyouga/geometry3k
  # +distillation.teacher_models.teacher_model2.model_path=Qwen/Qwen3-VL-4B-Instruct
  #
  # Instead, give the first teacher a different name:
  #
  # +distillation.teacher_models.teacher_model1.key=openai/gsm8k
  # +distillation.teacher_models.teacher_model1.model_path=Qwen/Qwen3-4B
  # +distillation.teacher_models.teacher_model2.key=hiyouga/geometry3k
  # +distillation.teacher_models.teacher_model2.model_path=Qwen/Qwen3-VL-4B-Instruct
  teacher_model:
    _target_: verl.workers.config.DistillationTeacherModelConfig
    key: null
    model_path: null
    num_replicas: 0
    inference:
      _target_: verl.workers.config.RolloutConfig
      name: ${oc.select:actor_rollout_ref.rollout.name}
      dtype: ${oc.select:actor_rollout_ref.rollout.dtype}
      gpu_memory_utilization: 0.5
      enforce_eager: true
      cudagraph_capture_sizes: null
      free_cache_engine: true
      data_parallel_size: 1
      expert_parallel_size: 1
      tensor_model_parallel_size: 2
      max_num_batched_tokens: 8192
      max_model_len: null
      max_num_seqs: 1024
      load_format: auto
      engine_kwargs: {}
      limit_images: null
      enable_chunked_prefill: true
      enable_prefix_caching: true
      disable_log_stats: true
      skip_tokenizer_init: true
      prompt_length: ${oc.select:actor_rollout_ref.rollout.prompt_length}
      response_length: ${oc.select:actor_rollout_ref.rollout.response_length}
      temperature: ${oc.select:actor_rollout_ref.rollout.temperature}

# Key to route examples to the appropriate teacher model in multi-teacher setups. Should correspond to a field in the data proto, e.g., task.
teacher_key: data_source
# OPSD-only settings. Consulted only when distillation.mode == "self".
self_distill:
  _target_: verl.workers.config.SelfDistillationConfig

  # How the teacher policy is obtained from the student.
  #   "ref":          frozen reference policy (vanilla on-policy distillation).
  #   "ema":          ref <- ema_decay * ref + (1 - ema_decay) * actor   (every step, default).
  #   "progressive":  ref <- actor  every teacher_update_interval steps.
  #   "trust_region": ref <- actor  whenever measured student/teacher KL <= trust_region_threshold.
  teacher_update: ema
  ema_decay: 0.999
  teacher_update_rate: 0.0          # legacy alias; if > 0, overrides ema_decay as (1 - teacher_update_rate)
  teacher_update_interval: 0        # required (> 0) for "progressive" mode
  trust_region_threshold: 0.0       # required (>= 0) for "trust_region" mode

  # Truncation strategy when teacher prompt exceeds data.max_prompt_length.
  truncation: right

  # Importable FQN of the user's teacher dataloader class. Subclass either
  #   verl.workers.self_distillation.OfflineTeacherDataloader
  # or
  #   verl.workers.self_distillation.OnlineTeacherDataloader
  # The framework auto-detects offline vs online via isinstance.
  # e.g. "my_pkg.my_module:MyTeacherDataloader"
  dataloader: null

  # Forwarded as **kwargs to the dataloader's __init__. tokenizer/processor
  # are injected by the framework.
  dataloader_kwargs: {}

  # Optional directory for debugging OPSD sample processing. Each step writes
  # one <global_step>.jsonl file; each line contains one rollout sample with
  # student prompt/response, teacher prompt, skip mask, reward info, and
  # first_100 response-token student/teacher logprob traces.
  # Disabled when null.
  sample_dump_path: null

  # Maximum samples to dump per training step. 0 means dump the full batch.
  sample_dump_max_per_step: 0
